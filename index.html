<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz: Automação no Mercado de Trabalho</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .container{width:100%;max-width:700px;background:white;border-radius:24px;box-shadow:0 25px 50px rgba(0,0,0,0.25);overflow:hidden}
    .header{padding:32px 28px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;text-align:center}
    .header h1{margin:0 0 8px 0;font-size:clamp(24px,5vw,32px);font-weight:700}
    .header p{margin:0;color:rgba(255,255,255,0.9);font-size:16px}
    .content{padding:32px 28px}
    .progress{width:100%;height:8px;background:#f1f5f9;border-radius:4px;margin-bottom:28px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#10b981,#34d399);border-radius:4px;transition:width 0.4s ease;width:0%}
    .question{padding:28px 24px;background:#f8fafc;border-radius:20px;border:1px solid #e2e8f0;margin-bottom:20px}
    .question-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .q-number{font-size:18px;font-weight:600;color:#1e293b}
    .question-text{font-size:18px;line-height:1.6;color:#0f172a;margin-bottom:24px;font-weight:500}
    .options{display:grid;gap:12px}
    .option{padding:16px 20px;border:2px solid #e2e8f0;border-radius:16px;background:white;cursor:pointer;transition:all 0.2s;font-size:16px;font-weight:500;color:#475569}
    .option:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(0,0,0,0.1)}
    .option.selected{border-color:#10b981;background:#ecfdf5;color:#065f46}
    .buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:28px}
    .btn{padding:14px 28px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.2s;min-width:140px}
    .btn-prev{background:#64748b;color:white}
    .btn-prev:hover{background:#475569}
    .btn-next{background:#3b82f6;color:white}
    .btn-next:hover{background:#2563eb}
    .btn-finish{background:#10b981;color:white}
    .btn-finish:hover{background:#059669}
    .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none!important}
    .result{text-align:center;padding:48px 32px}
    .result h2{font-size:clamp(28px,6vw,42px);color:#1e293b;margin-bottom:16px}
    .result-score{font-size:clamp(48px,12vw,96px);font-weight:800;background:linear-gradient(135deg,#10b981,#34d399);background-clip:text;-webkit-background-clip:text;color:transparent;margin:0 0 24px 0}
    .team{margin-top:40px}
    .team-title{font-size:18px;color:#64748b;font-weight:500;margin-bottom:20px}
    .team-names{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
    .name-tag{padding:12px 20px;background:#ecfdf5;border:2px solid #10b981;border-radius:50px;color:#065f46;font-weight:600;font-size:16px}
    .hidden{display:none!important}
    @media(max-width:480px){.content{padding:24px 20px}.question{padding:24px 20px}}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔄 Quiz Automação</h1>
      <p>Automação no Mercado de Trabalho<br><small>10 perguntas rápidas</small></p>
    </div>

    <div class="content">
      <div id="quiz-area">
        <div class="progress"><div class="progress-fill" id="progress"></div></div>
        <div class="question" id="question-container">
          <div class="question-header">
            <div class="q-number" id="q-number">1 de 10</div>
          </div>
          <div class="question-text" id="question"></div>
          <div class="options" id="options"></div>
          <div class="buttons">
            <button class="btn btn-prev" id="prev">◀ Anterior</button>
            <button class="btn btn-next" id="next">Próxima ▶</button>
            <button class="btn btn-finish hidden" id="finish">Finalizar Quiz</button>
          </div>
        </div>
      </div>

      <div id="result-area" class="result hidden">
        <h2>Quiz Concluído!</h2>
        <div class="result-score" id="final-score">0/10</div>
        <div class="team">
          <div class="team-title">Desenvolvido por:</div>
          <div class="team-names">
            <div class="name-tag">Victor</div>
            <div class="name-tag">Marcelo</div>
            <div class="name-tag">Arthur</div>
            <div class="name-tag">André</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const questions = [
      {q:"O que significa automação no trabalho?",o:["Substituição total de pessoas","Uso de tecnologia para tarefas repetitivas","Trabalho manual sem ferramentas","Apenas robôs industriais"],c:1},
      {q:"Qual área é mais impactada pela automação?",o:["Tarefas criativas","Tarefas repetitivas","Profissões artísticas","Esportes"],c:1},
      {q:"Principal benefício da automação?",o:["Mais erros","Redução de eficiência","Aumento de produtividade","Fim de empregos"],c:2},
      {q:"Exemplo clássico de automação?",o:["Caixa eletrônico","Lápis e papel","Caderno manual","Relógio mecânico"],c:0},
      {q:"A automação pode criar novos empregos?",o:["Nunca cria","Sim, em tecnologia","Só em profissões antigas","Apenas agricultura"],c:1},
      {q:"Habilidade mais importante com automação?",o:["Memorização","Pensamento crítico","Velocidade de digitação","Evitar tecnologia"],c:1},
      {q:"Automação substitui melhor tarefas:",o:["Criativas","Repetitivas e padronizadas","Com empatia","Com julgamento complexo"],c:1},
      {q:"Principal risco da automação?",o:["Eliminar atualização profissional","Deslocamento de alguns empregos","Aumento de tarefas repetitivas","Menos eficiência"],c:1},
      {q:"Profissional importante na automação?",o:["Técnico de manutenção","Poeta","Pintor","Jornalista"],c:0},
      {q:"Melhor postura diante da automação?",o:["Ignorar mudanças","Aprender e se adaptar","Parar de estudar","Evitar tecnologia"],c:1}
    ];

    let current=0,score=0,answers=new Array(10).fill(null);

    const els={
      quiz:document.getElementById('quiz-area'),
      result:document.getElementById('result-area'),
      question:document.getElementById('question'),
      options:document.getElementById('options'),
      number:document.getElementById('q-number'),
      progress:document.getElementById('progress'),
      prev:document.getElementById('prev'),
      next:document.getElementById('next'),
      finish:document.getElementById('finish'),
      finalScore:document.getElementById('final-score')
    };

    function updateScore(){
      score=answers.filter((a,i)=>a===questions[i].c).length;
    }

    function render(){
      const q=questions[current];
      els.number.textContent=`${current+1} de 10`;
      els.question.textContent=q.q;
      els.options.innerHTML='';
      q.o.forEach((opt,i)=>{
        const btn=document.createElement('button');
        btn.className='option'+(answers[current]===i?' selected':'');
        btn.textContent=opt;
        btn.onclick=()=>select(i);
        els.options.appendChild(btn);
      });
      els.progress.style.width=`${(current+1)/10*100}%`;
      els.prev.disabled=current===0;
      els.next.classList.toggle('hidden',current===9);
      els.finish.classList.toggle('hidden',current!==9);
    }

    function select(i){
      answers[current]=i;
      render();
    }

    els.prev.onclick=()=>current>0&&(current--,render());
    els.next.onclick=()=>current<9&&(current++,render());
    els.finish.onclick=()=>{
      updateScore();
      els.quiz.classList.add('hidden');
      els.result.classList.remove('hidden');
      els.finalScore.textContent=`${score}/10`;
    };

    render();
  </script>
</body>
</html>
